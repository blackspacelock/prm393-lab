name: Build iOS IPA

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: lab-2-journal-trend-analysis/journal_trend_analysis

    steps:
    - uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Dependencies
      run: flutter pub get

    # SỬA TẠI ĐÂY: Sử dụng lệnh build ipa thô
    - name: Build iOS IPA (Unsigned)
      run: flutter build ipa --no-codesign

    # SỬA TẠI ĐÂY: Chỉ định đường dẫn quét chính xác tới file .ipa đã đóng gói
    - name: Upload iOS IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-app
        path: "**/build/ios/ipa/*.ipa"