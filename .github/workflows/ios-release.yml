name: Build iOS IPA

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: lab-2-journal-trend-analysis/journal_trend_analysis

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Remove CocoaPods (plugins use Swift Package Manager)
        run: |
          rm -f ios/Podfile
          rm -f ios/Podfile.lock
          rm -rf ios/Pods

      - name: Install Dependencies
        run: flutter pub get

      - name: Fix iOS minimum deployment target
        run: sed -i '' 's/.iOS("13.0")/.iOS("15.0")/g' ios/Flutter/ephemeral/Packages/FlutterGeneratedPluginSwiftPackage/Package.swift

      - name: Build iOS Application (unsigned)
        run: |
          cd ios
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET=15.0

      - name: Pack .app into .ipa
        run: |
          mkdir -p Payload
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path "*/Release-iphoneos/Runner.app" -type d | head -1)
          echo "Found Runner.app at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r app-unsigned.ipa Payload

      - name: Upload iOS IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: lab-2-journal-trend-analysis/journal_trend_analysis/app-unsigned.ipa
