name: journal_trend_analysis
description: Journal Trend Analyzer — publication trend analysis using OpenAlex API.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.5
  google_fonts: ^6.2.1
  go_router: ^13.2.4
  countries_world_map: ^1.3.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  freezed: ^2.5.2
  json_serializable: ^6.7.1
  riverpod_generator: ^2.4.0
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21 # Chọn theo min_sdk của dự án (tùy chọn)

  android: true
  ios: true

  windows:
    generate: true
    image_path: "assets/icon/app_icon.png" # Đường dẫn ảnh icon (khuyên dùng file .ico hoặc .png lớn)
    icon_size: 48 # Kích thước icon (tùy chọn)
